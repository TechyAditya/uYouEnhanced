# Original idea by @ISnackable. Thanks to him for handling the hardest parts!
# https://github.com/ISnackable/YTCubePlus/blob/main/.github/workflows/Build.yml

name: Build and Release uYouEnhanced

on:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: "iOS SDK Version"
        default: "26.4"
        required: true
        type: string
      uyou_version:
        description: "uYou Version"
        default: "3.0.4"
        required: true
        type: string
      decrypted_youtube_url:
        description: "Direct URL of the decrypted YouTube IPA"
        default: ""
        required: true
        type: string
      bundle_id:
        description: "Modify the bundle ID"
        default: "com.google.ios.youtube"
        required: true
        type: string
      app_name:
        description: "Modify the app name"
        default: "YouTube"
        required: true
        type: string
      commit_id:
        description: "(Optional) Commit ID to build at"
        default: ""
        required: false
        type: string
      upload_artifact:
        description: "Upload IPA as artifact"
        default: false
        required: false
        type: boolean
      create_release:
        description: "Create a draft release"
        default: true
        required: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build uYouEnhanced
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout Main
        uses: actions/checkout@v5
        with:
          path: main
          ref: ${{ github.event.inputs.commit_id || github.ref }}
          submodules: recursive

      - name: Install Dependencies
        run: brew install ldid dpkg make

      - name: Set PATH environment variable
        run: echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      - name: Setup Theos
        uses: actions/checkout@v5
        with:
          repository: theos/theos
          ref: master
          path: theos
          submodules: recursive

      - name: SDK Caching
        id: SDK
        uses: actions/cache@v4.3.0
        env:
          cache-name: iOS-${{ inputs.sdk_version }}-SDK-${{ runner.os }}-v3
        with:
          path: theos/sdks/
          key: ${{ env.cache-name }}

      - name: Ensure iOS SDK present
        run: |
          set -euo pipefail
          SDK_DIR="$THEOS/sdks/iPhoneOS${{ inputs.sdk_version }}.sdk"

          if [ -d "$SDK_DIR" ]; then
            echo "SDK already present: $SDK_DIR"
          else
            echo "SDK missing in cache, downloading iPhoneOS${{ inputs.sdk_version }}.sdk..."
            git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/xybp888/iOS-SDKs.git sdks
            cd sdks
            git sparse-checkout init --cone
            git sparse-checkout set iPhoneOS${{ inputs.sdk_version }}.sdk
            git checkout

            test -d "iPhoneOS${{ inputs.sdk_version }}.sdk" || {
              echo "SDK iPhoneOS${{ inputs.sdk_version }}.sdk not found in repo"
              exit 1
            }

            mkdir -p "$THEOS/sdks"
            mv "iPhoneOS${{ inputs.sdk_version }}.sdk" "$THEOS/sdks/"
          fi

          # iPhoneOS26.4 SDK ships modulemaps gated by a clang feature that Theos toolchains may not expose yet.
          # Strip that gate so standard libc typedef modules (size_t/ptrdiff_t/wchar_t) can be imported.
          if [ "${{ inputs.sdk_version }}" = "26.4" ]; then
            echo "Applying iPhoneOS26.4 SDK compatibility patch..."
            find "$THEOS/sdks/iPhoneOS${{ inputs.sdk_version }}.sdk" -type f -name "*.modulemap" -print0 \
              | xargs -0 sed -i '' -E "s/ requires feature 'found_incompatible_headers__check_search_paths'//g"
          fi

          ls -la "$THEOS/sdks"
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Setup Theos Jailed
        uses: actions/checkout@v5
        with:
          repository: qnblackcat/theos-jailed
          ref: master
          path: theos-jailed
          submodules: recursive

      - name: Install Theos Jailed
        run: |
          ./theos-jailed/install
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Patch iPhoneOS26.4 modulemaps
        if: ${{ inputs.sdk_version == '26.4' }}
        run: |
          set -euo pipefail
          SDK_DIR="$THEOS/sdks/iPhoneOS${{ inputs.sdk_version }}.sdk"
          test -d "$SDK_DIR" || { echo "Missing SDK for patching: $SDK_DIR"; exit 1; }

          # Remove unsupported clang feature gate introduced in iOS 26.4 SDK modulemaps.
          MATCHES_BEFORE="$(grep -RIl "found_incompatible_headers__check_search_paths" "$SDK_DIR" || true)"
          if [ -n "$MATCHES_BEFORE" ]; then
            echo "Found feature-gated modulemaps before patch:"
            echo "$MATCHES_BEFORE"

            while IFS= read -r modulemap; do
              [ -n "$modulemap" ] || continue
              perl -0777 -i -pe 's/\s+requires\s+(?:feature\s+)?["\x27]?found_incompatible_headers__check_search_paths["\x27]?//g' "$modulemap"
            done <<< "$MATCHES_BEFORE"

            DARWIN_MODULEMAP="$SDK_DIR/usr/include/DarwinFoundation1.modulemap"
            if [ -f "$DARWIN_MODULEMAP" ]; then
              sed -i '' -E "s/[[:space:]]+requires[[:space:]]+(feature[[:space:]]+)?['\"]?found_incompatible_headers__check_search_paths['\"]?//g" "$DARWIN_MODULEMAP"
            fi
          else
            echo "No feature-gated modulemaps found before patch."
          fi

          MATCHES_AFTER="$(grep -RIl "found_incompatible_headers__check_search_paths" "$SDK_DIR" || true)"
          if [ -n "$MATCHES_AFTER" ]; then
            echo "Feature-gated modulemaps still present after patch:"
            echo "$MATCHES_AFTER"
            echo "SDK patch verification failed: feature gate still present"
            exit 1
          fi

          # UIKit in iPhoneOS26.4 may import <UIUtilities/UIDefines.h> which is not always
          # exposed through usr/include in third-party SDK bundles. Bridge those headers.
          UIUTILITIES_SRC=""
          UIDEFINES_PATH="$(find "$SDK_DIR/System/Library" -type f -path "*/UIUtilities.framework/Headers/UIDefines.h" | head -n1 || true)"
          if [ -n "$UIDEFINES_PATH" ]; then
            UIUTILITIES_SRC="$(dirname "$UIDEFINES_PATH")"
            echo "Using UIUtilities headers from: $UIUTILITIES_SRC"
          fi

          if [ -n "$UIUTILITIES_SRC" ]; then
            UIUTILITIES_DST="$SDK_DIR/usr/include/UIUtilities"
            mkdir -p "$UIUTILITIES_DST"
            cp -f "$UIUTILITIES_SRC"/*.h "$UIUTILITIES_DST"/ 2>/dev/null || true
            if [ ! -f "$UIUTILITIES_DST/UIDefines.h" ]; then
              echo "SDK compatibility patch failed: UIDefines.h still missing after bridge copy"
              exit 1
            fi
            echo "UIUtilities headers bridged to usr/include/UIUtilities"
          else
            echo "SDK compatibility patch failed: UIUtilities headers not found in SDK System/Library"
            exit 1
          fi

          # libc++ in iPhoneOS26.4 uses clang-19 builtins (__builtin_ctzg/__builtin_clzg).
          # Theos CI toolchains can be older, so patch to guarded fallbacks.
          COUNTR_H="$SDK_DIR/usr/include/c++/v1/__bit/countr.h"
          COUNTL_H="$SDK_DIR/usr/include/c++/v1/__bit/countl.h"
          if [ -f "$COUNTR_H" ]; then
            perl -i -pe 's@return __builtin_ctzg\(__t, numeric_limits<_Tp>::digits\);@#if __has_builtin(__builtin_ctzg)\n  return __builtin_ctzg(__t, numeric_limits<_Tp>::digits);\n#else\n  if (__t == 0)\n    return numeric_limits<_Tp>::digits;\n  if (sizeof(_Tp) <= sizeof(unsigned int))\n    return __builtin_ctz(static_cast<unsigned int>(__t));\n  else if (sizeof(_Tp) <= sizeof(unsigned long))\n    return __builtin_ctzl(static_cast<unsigned long>(__t));\n  else\n    return __builtin_ctzll(static_cast<unsigned long long>(__t));\n#endif@g' "$COUNTR_H"
          fi

          if [ -f "$COUNTL_H" ]; then
            perl -i -pe 's@return __builtin_clzg\(__t, numeric_limits<_Tp>::digits\);@#if __has_builtin(__builtin_clzg)\n  return __builtin_clzg(__t, numeric_limits<_Tp>::digits);\n#else\n  if (__t == 0)\n    return numeric_limits<_Tp>::digits;\n  if (sizeof(_Tp) <= sizeof(unsigned int))\n    return __builtin_clz(static_cast<unsigned int>(__t)) - (numeric_limits<unsigned int>::digits - numeric_limits<_Tp>::digits);\n  else if (sizeof(_Tp) <= sizeof(unsigned long))\n    return __builtin_clzl(static_cast<unsigned long>(__t)) - (numeric_limits<unsigned long>::digits - numeric_limits<_Tp>::digits);\n  else\n    return __builtin_clzll(static_cast<unsigned long long>(__t)) - (numeric_limits<unsigned long long>::digits - numeric_limits<_Tp>::digits);\n#endif@g' "$COUNTL_H"
          fi

          POINTER_TRAITS_H="$SDK_DIR/usr/include/c++/v1/__memory/pointer_traits.h"
          if [ -f "$POINTER_TRAITS_H" ]; then
            # Older clang rejects static_assert(false, ...) in template definitions.
            perl -i -pe 's/static_assert\(false, "Cannot rebind pointer; did you forget to add a rebind member to your pointer\?"\);/static_assert(is_void<_Tp>::value \&\& !is_void<_Tp>::value, "Cannot rebind pointer; did you forget to add a rebind member to your pointer?");/g' "$POINTER_TRAITS_H"
          fi

          grep -n "__has_builtin(__builtin_ctzg)" "$COUNTR_H" >/dev/null || { echo "countr.h patch failed"; exit 1; }
          grep -n "__has_builtin(__builtin_clzg)" "$COUNTL_H" >/dev/null || { echo "countl.h patch failed"; exit 1; }
          grep -n "is_void<_Tp>::value && !is_void<_Tp>::value" "$POINTER_TRAITS_H" >/dev/null || { echo "pointer_traits.h patch failed"; exit 1; }
          echo "libc++ bit header compatibility patch applied."

          echo "SDK 26.4 compatibility patch applied and verified."
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Hash YT ipa url
        run: |
          URL_YT="$(jq -r '.inputs.decrypted_youtube_url' $GITHUB_EVENT_PATH)"
          echo ::add-mask::$URL_YT
          echo URL_YT=$URL_YT >> $GITHUB_ENV

      - name: Prepare YouTube iPA
        id: prepare_youtube
        run: |
          wget "$YOUTUBE_URL" --quiet --no-verbose -O main/YouTube.ipa
          cd ${{ github.workspace }}/main
          mv YouTube.ipa YouTube.zip
          unzip -q YouTube.zip
          youtube_version=$(defaults read "$(pwd)/Payload/YouTube.app/Info" CFBundleVersion)
          echo "==> YouTube v$youtube_version downloaded!"
          sed -i '' "17s#.*#YOUTUBE_VERSION = ${youtube_version}#g" Makefile
          echo "youtube_version=${youtube_version}" >> $GITHUB_OUTPUT
        env:
          THEOS: ${{ github.workspace }}/theos
          YOUTUBE_URL: ${{ env.URL_YT }}

      - name: Fix compiling & Build Package
        id: build_package
        run: |
          cd ${{ github.workspace }}/main
          test -d "$THEOS/sdks/iPhoneOS${{ inputs.sdk_version }}.sdk" || { echo "Missing SDK before build"; exit 1; }
          sed -i '' "30s#.*#BUNDLE_ID = ${{ env.BUNDLE_ID }}#g" Makefile                           # Modify the bundle ID
          sed -i '' "29s#.*#DISPLAY_NAME = ${{ env.APP_NAME }}#g" Makefile                         # Modify the app name
          sed -i '' -E "s|^export TARGET *=.*$|export TARGET = iphone:clang:${{ inputs.sdk_version }}:15.0|g" Makefile
          sed -i '' -E "s|^export SDK_PATH *=.*$|export SDK_PATH = \$(THEOS)/sdks/iPhoneOS${{ inputs.sdk_version }}.sdk/|g" Makefile
          make package THEOS_PACKAGE_SCHEME=rootless IPA=Payload/YouTube.app FINALPACKAGE=1
          echo "package=$(ls -t packages | head -n1)" >> $GITHUB_OUTPUT
          echo -e "==> \033[1mSHASUM256: $(shasum -a 256 packages/*.ipa | cut -f1 -d' ')\033[0m"
          echo -e "==> \033[1mBundle ID: ${{ env.BUNDLE_ID }}\033[0m"
        env:
          THEOS: ${{ github.workspace }}/theos
          UYOU_VERSION: ${{ inputs.uyou_version }}
          BUNDLE_ID: ${{ inputs.bundle_id }}
          APP_NAME: ${{ inputs.app_name }}

      - name: Upload Artifact
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v5
        env:
          UYOU_VERSION: ${{ inputs.uyou_version }}
          YOUTUBE_VERSION: ${{ steps.prepare_youtube.outputs.youtube_version }}
        with:
          name: uYouEnhanced_${{ env.YOUTUBE_VERSION }}_${{ env.UYOU_VERSION }}
          path: ${{ github.workspace }}/main/packages/${{ steps.build_package.outputs.package }}
          if-no-files-found: error

      - name: Create Release
        if: ${{ inputs.create_release }}
        id: create_release
        uses: softprops/action-gh-release@v2.5.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UYOU_VERSION: ${{ inputs.uyou_version }}
          YOUTUBE_VERSION: ${{ steps.prepare_youtube.outputs.youtube_version }}
        with:
          tag_name: v${{ env.YOUTUBE_VERSION }}-${{ env.UYOU_VERSION }}-(${{ github.run_number }})
          name: v${{ env.YOUTUBE_VERSION }}-${{ env.UYOU_VERSION }}-(${{ github.run_number }})
          files: main/packages/*.ipa
          draft: true
